<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYTHM ACADEMY | Register</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-animation"></div>
    
    <nav class="site-nav">
        <ul>
            <li><a href="index.html">Programs</a></li>
            <li><a href="importance.html">Importance</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="register.html" class="active">Register</a></li>
        </ul>
    </nav>
    
    <div class="container main-layout">
        <header>
            <h1>RYTHM ACADEMY</h1>
            <p class="author-name">by MEGHA SHREE N</p>
            <p>Join Our Musical Journey</p>
        </header>

        <section id="register" class="content-section">
            <div class="form-container">
                <h2>Registration Form</h2>
                <form id="registrationForm">
                    <div class="input-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>
                    
                    <div class="input-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="+1 234 567 8900">
                    </div>
                    
                    <div class="input-group">
                        <label for="instrument">Instrument of Choice</label>
                        <select id="instrument" name="instrument" required>
                            <option value="" disabled selected>Select an instrument</option>
                            <option value="Piano">Piano</option>
                            <option value="Guitar">Guitar</option>
                            <option value="Violin">Violin</option>
                            <option value="Drums">Drums</option>
                            <option value="Vocals">Vocals</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn">
                        <span class="btn-text">Register Now</span>
                        <div class="spinner hidden"></div>
                    </button>
                </form>
                <div id="messageBox" class="message-box hidden"></div>
            </div>
        </section>
        
        <footer class="bottom-footer">
            <p>created by html css java nodejs mysql and github</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
